addstuff.siteSettings.title=Add Stuff
addstuff.siteSettings.description=Agregue fragmentos de código personalizados a cada página de este sitio. Visible solo en los modos de vista previa y live.

addstuff.siteSettings.headTop.help=Se carga antes que cualquier otra cosa. Ideal para gestores de etiquetas (p. ej., fragmento de Google Tag Manager).
addstuff.siteSettings.head.help=Se carga antes de que la página se renderice. Ideal para hojas de estilo, fuentes o metaetiquetas.
addstuff.siteSettings.bodyTop.help=Primer elemento dentro del body. Ideal para el fallback noscript de GTM o banners de consentimiento de cookies.
addstuff.siteSettings.body.help=Se carga después de todo el contenido de la página. Ideal para analíticas, widgets de chat o scripts diferidos.
