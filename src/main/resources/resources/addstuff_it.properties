addstuff.siteSettings.title=Add Stuff
addstuff.siteSettings.description=Aggiungi frammenti di codice personalizzati a ogni pagina di questo sito. Visibile solo nelle modalit\u00e0 anteprima e live.

addstuff.siteSettings.headTop.help=Caricato prima di qualsiasi altra cosa. Ideale per i tag manager (es. snippet di Google Tag Manager).
addstuff.siteSettings.head.help=Caricato prima del rendering della pagina. Ideale per fogli di stile, font o meta tag.
addstuff.siteSettings.bodyTop.help=Primo elemento all'interno del body. Ideale per il fallback noscript di GTM o i banner di consenso ai cookie.
addstuff.siteSettings.body.help=Caricato dopo tutto il contenuto della pagina. Ideale per analytics, widget di chat o script differiti.
