addstuff.siteSettings.title=Add Stuff
addstuff.siteSettings.description=Add custom code snippets to every page of this site. Visible in preview and live modes only.

addstuff.siteSettings.headTop.help=Loaded before anything else. Ideal for tag managers (e.g. Google Tag Manager snippet).
addstuff.siteSettings.head.help=Loaded before the page renders. Ideal for stylesheets, fonts, or meta tags.
addstuff.siteSettings.bodyTop.help=First element inside the body. Ideal for GTM noscript fallback or cookie consent banners.
addstuff.siteSettings.body.help=Loaded after all page content. Ideal for analytics, chat widgets, or deferred scripts.
