jnt_addStuffSiteSettings=Add Stuff
addstuff.siteSettings.title=Add Stuff
addstuff.siteSettings.description=Inject custom HTML into the HEAD or BODY of all pages on this site (preview and live mode only).
addstuff.siteSettings.headTop.help=Injected right after the opening <head> tag. Use for high-priority scripts (e.g. Google Tag Manager).
addstuff.siteSettings.head.help=Injected right before the closing </head> tag. Use for CSS overrides or late-loading scripts.
addstuff.siteSettings.bodyTop.help=Injected right after the opening <body> tag. Use for noscript fallbacks (e.g. GTM noscript).
addstuff.siteSettings.body.help=Injected right before the closing </body> tag. Use for deferred scripts or analytics.
