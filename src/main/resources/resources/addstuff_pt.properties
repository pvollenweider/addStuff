addstuff.siteSettings.description=Adicione fragmentos de código personalizados a cada página deste site. Visível apenas nos modos de pré-visualização e live.

addstuff.siteSettings.headTop.help=Carregado antes de qualquer outra coisa. Ideal para gestores de etiquetas (ex.: snippet do Google Tag Manager).
addstuff.siteSettings.head.help=Carregado antes da renderização da página. Ideal para folhas de estilo, fontes ou meta tags.
addstuff.siteSettings.bodyTop.help=Primeiro elemento dentro do body. Ideal para o fallback noscript do GTM ou banners de consentimento de cookies.
addstuff.siteSettings.body.help=Carregado após todo o conteúdo da página. Ideal para análises, widgets de chat ou scripts diferidos.
